<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lịch & KQ - LiveCup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css?v=260612-3">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Điều hướng">
        <a class="brand" href="./index.html" aria-label="LiveCup">
          <span class="brand-mark">LC</span>
          <span>LiveCup</span>
        </a>
        <nav class="nav-list">
          <a class="nav-item" href="./index.html">Live</a>
          <a class="nav-item active" href="./matches.html">Lịch & KQ</a>
          <a class="nav-item" href="./standings.html">BXH</a>
          <a class="nav-item" href="./teams.html">Đội tuyển</a>
          <a class="nav-item" href="./index.html#events">Diễn biến</a>
        </nav>
        <div class="source-box">
          <span class="source-label">Lịch đấu</span>
          <strong>104 trận</strong>
          <p>Lịch và kết quả được nhóm theo ngày Việt Nam, cập nhật định kỳ từ nguồn miễn phí.</p>
        </div>
      </aside>

      <main class="main">
        <section class="panel page-panel" aria-labelledby="matches-page-title">
          <div class="panel-header">
            <div>
              <span class="section-kicker">World Cup 2026</span>
              <h2 id="matches-page-title">Lịch đấu & kết quả</h2>
            </div>
            <span class="pill" id="matches-count">0 trận</span>
          </div>
          <div class="page-tabs tabs" role="tablist" aria-label="Lọc lịch và kết quả">
            <button class="tab active" type="button" data-tab="schedule">Lịch đấu</button>
            <button class="tab" type="button" data-tab="results">Kết quả</button>
          </div>
          <div class="matches-by-day" id="matches-by-day"></div>
        </section>
      </main>
    </div>

    <script src="./ui-render-helpers.js?v=260612-3"></script>
    <script src="./matches-page.js?v=260612-3"></script>
  </body>
</html>
