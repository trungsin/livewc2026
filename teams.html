<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đội tuyển — LiveCup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Điều hướng">
        <a class="brand" href="./index.html" aria-label="LiveCup">
          <span class="brand-mark">LC</span>
          <span>LiveCup</span>
        </a>
        <nav class="nav-list">
          <a class="nav-item" href="./index.html">Live</a>
          <a class="nav-item" href="./matches.html">Lịch & KQ</a>
          <a class="nav-item" href="./standings.html">BXH</a>
          <a class="nav-item active" href="./teams.html">Đội tuyển</a>
          <a class="nav-item" href="./index.html#events">Diễn biến</a>
        </nav>
      </aside>

      <main class="main">
        <section class="panel teams-panel teams-page-panel" id="teams" aria-labelledby="teams-title">
          <div class="panel-header">
            <div>
              <span class="section-kicker">Squads</span>
              <h2 id="teams-title">Đội tuyển và cầu thủ</h2>
            </div>
            <span class="pill" id="team-count">0 đội</span>
          </div>
          <div class="team-browser">
            <div class="team-grid" id="team-grid"></div>
            <aside class="team-detail" id="team-detail" aria-live="polite">
              <div class="empty-state">Chọn một đội để xem danh sách cầu thủ, HLV và thông tin cầu thủ từ nguồn miễn phí.</div>
            </aside>
          </div>
        </section>
      </main>
    </div>

    <script src="./ui-render-helpers.js"></script>
    <script src="./teams-page.js"></script>
  </body>
</html>
