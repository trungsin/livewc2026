# Cấu hình Worker duy nhất: static assets + API + WebSocket realtime.
# Deploy: npx wrangler deploy (Workers Builds trên dashboard cũng chạy lệnh này)
# Local: npx wrangler dev

name = "livewc2026"
main = "worker/index.js"
compatibility_date = "2026-06-01"

[assets]
directory = "."
binding = "ASSETS"

[[durable_objects.bindings]]
name = "LIVE_HUB"
class_name = "LiveHub"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["LiveHub"]
